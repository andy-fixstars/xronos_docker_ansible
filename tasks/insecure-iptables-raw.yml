---
- name: Create a docker.service override directory
  when: docker_insecure_no_iptables_raw
  become: true
  ansible.builtin.file:
    owner: root
    group: root
    mode: 0755
    path: /etc/systemd/system/docker.service.d
    state: directory

- name: Set up docker.service override
  when: docker_insecure_no_iptables_raw
  become: true
  community.general.ini_file:
    dest: /etc/systemd/system/docker.service.d/insecure_no_iptables_raw_override.conf
    owner: root
    group: root
    mode: 0644
    section: Service
    option: Environment
    value: "DOCKER_INSECURE_NO_IPTABLES_RAW=1"

- name: Restart docker service
  when: docker_insecure_no_iptables_raw
  become: true
  ansible.builtin.systemd_service:
    name: docker
    state: restarted
